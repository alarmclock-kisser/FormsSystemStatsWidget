name: Build and Release WinForms App FSS Widget

on:
  push:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build --Release
      run: dotnet build FormsSystemStatsWidget.Forms/FormsSystemStatsWidget.Forms.csproj --configuration Release --no-restore
    
    - name: Publish
      run: dotnet publish FormsSystemStatsWidget.Forms/FormsSystemStatsWidget.Forms.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfContained=true -o ./publish

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./publish/*.exe
        tag_name: release-${{ github.run_number }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}